name: Deploy Agent to Cloud Run

on:
  push:
    branches: [main]
    paths:
      - 'projects/team07-sequel/app/**'
      - 'projects/team07-sequel/pyproject.toml'
      - 'projects/team07-sequel/uv.lock'
      - 'projects/team07-sequel/Dockerfile.api'
      - 'projects/team07-sequel/data/**'
      - '.github/workflows/deploy-agent.yml'

permissions:
  contents: read
  id-token: write

jobs:
  deploy:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - id: auth
        uses: google-github-actions/auth@v2
        with:
          workload_identity_provider: ${{ secrets.WIF_PROVIDER }}
          service_account: ${{ secrets.GCP_SERVICE_ACCOUNT }}

      - uses: google-github-actions/setup-gcloud@v2

      - name: Docker 인증
        run: gcloud auth configure-docker asia-northeast3-docker.pkg.dev

      - name: 이미지 빌드 & push
        run: |
          docker build -f projects/team07-sequel/Dockerfile.api \
            -t asia-northeast3-docker.pkg.dev/${{ secrets.GCP_PROJECT_ID }}/text2sql-repo/agent:${{ github.sha }} \
            projects/team07-sequel
          docker push asia-northeast3-docker.pkg.dev/${{ secrets.GCP_PROJECT_ID }}/text2sql-repo/agent:${{ github.sha }}

      - name: Cloud Run 배포
        run: |
          gcloud run deploy text2sql-agent \
            --image=asia-northeast3-docker.pkg.dev/${{ secrets.GCP_PROJECT_ID }}/text2sql-repo/agent:${{ github.sha }} \
            --region=asia-northeast3 \
            --port=8001 \
            --allow-unauthenticated \
            --set-env-vars="SUPABASE_DB_URL=${{ secrets.SUPABASE_DB_URL }},UPSTAGE_API_KEY=${{ secrets.UPSTAGE_API_KEY }},LANGFUSE_PUBLIC_KEY=${{ secrets.LANGFUSE_PUBLIC_KEY }},LANGFUSE_SECRET_KEY=${{ secrets.LANGFUSE_SECRET_KEY }},LANGFUSE_HOST=${{ secrets.LANGFUSE_BASE_URL }}"
