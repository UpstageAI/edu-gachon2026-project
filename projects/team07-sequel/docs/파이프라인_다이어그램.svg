<svg viewBox="0 0 800 752" width="800" height="752" xmlns="http://www.w3.org/2000/svg" font-family="Pretendard,'Apple SD Gothic Neo','Malgun Gothic',system-ui,sans-serif">
  <defs>
    <marker id="mf" viewBox="0 0 8 8" markerWidth="7" markerHeight="7" refX="6" refY="4" orient="auto"><path d="M0,1 L6,4 L0,7 Z" fill="#475569"/></marker>
    <marker id="md" viewBox="0 0 8 8" markerWidth="7" markerHeight="7" refX="6" refY="4" orient="auto"><path d="M0,1 L6,4 L0,7 Z" fill="#94a3b8"/></marker>
    <marker id="ml" viewBox="0 0 8 8" markerWidth="7" markerHeight="7" refX="6" refY="4" orient="auto"><path d="M0,1 L6,4 L0,7 Z" fill="#64748b"/></marker>
  </defs>
  <rect width="800" height="752" fill="#ffffff"/>

  <!-- ───────── 좌측: 파이프라인 플로우 ───────── -->
  <!-- user -->
  <rect x="110" y="24" width="230" height="40" rx="10" fill="#fff" stroke="#d9dfe8" stroke-width="1.2"/>
  <text x="225" y="49" text-anchor="middle" font-size="13" font-weight="600" fill="#1e293b">user (질의)</text>
  <line x1="225" y1="64" x2="225" y2="82" stroke="#475569" stroke-width="1.3" marker-end="url(#mf)"/>

  <!-- normalize -->
  <rect x="110" y="84" width="230" height="52" rx="10" fill="#fff" stroke="#d9dfe8" stroke-width="1.2"/>
  <text x="225" y="105" text-anchor="middle" font-size="13" font-weight="600" fill="#1e293b">normalize</text>
  <text x="225" y="122" text-anchor="middle" font-size="10" fill="#8a94a3">시간 정규화(규칙) · 질문 정리 (mini)</text>
  <line x1="225" y1="136" x2="225" y2="154" stroke="#475569" stroke-width="1.3" marker-end="url(#mf)"/>

  <!-- schema linker -->
  <rect x="110" y="156" width="230" height="52" rx="10" fill="#fff" stroke="#d9dfe8" stroke-width="1.2"/>
  <text x="225" y="177" text-anchor="middle" font-size="13" font-weight="600" fill="#1e293b">schema linker</text>
  <text x="225" y="194" text-anchor="middle" font-size="10" fill="#8a94a3">스키마 축소 · 값 링킹 · few-shot</text>
  <line x1="225" y1="208" x2="225" y2="226" stroke="#475569" stroke-width="1.3" marker-end="url(#mf)"/>

  <!-- Router -->
  <rect x="110" y="228" width="230" height="52" rx="10" fill="#fff" stroke="#d9dfe8" stroke-width="1.2"/>
  <text x="225" y="249" text-anchor="middle" font-size="13" font-weight="600" fill="#1e293b">Router (solar-mini · 1콜)</text>
  <text x="225" y="266" text-anchor="middle" font-size="10" fill="#8a94a3">안전성 fail-closed · 난이도 분류</text>
  <line x1="225" y1="280" x2="225" y2="298" stroke="#475569" stroke-width="1.3" marker-end="url(#mf)"/>

  <!-- generate -->
  <rect x="110" y="300" width="230" height="72" rx="10" fill="#fff" stroke="#d9dfe8" stroke-width="1.2"/>
  <text x="225" y="321" text-anchor="middle" font-size="13" font-weight="600" fill="#1e293b">SQL 생성 (solar-pro2)</text>
  <text x="225" y="337" text-anchor="middle" font-size="10" fill="#8a94a3">난이도 → few-shot k 선택</text>
  <rect x="125" y="346" width="94" height="22" rx="7" fill="#f6f8fb" stroke="#e3e8f0"/>
  <text x="172" y="361" text-anchor="middle" font-size="10" fill="#475569">하·중 → k3</text>
  <rect x="231" y="346" width="94" height="22" rx="7" fill="#f6f8fb" stroke="#e3e8f0"/>
  <text x="278" y="361" text-anchor="middle" font-size="10" fill="#475569">상·최상 → k8</text>
  <line x1="225" y1="372" x2="225" y2="390" stroke="#475569" stroke-width="1.3" marker-end="url(#mf)"/>

  <!-- validator -->
  <rect x="110" y="392" width="230" height="52" rx="10" fill="#fff" stroke="#d9dfe8" stroke-width="1.2"/>
  <text x="225" y="413" text-anchor="middle" font-size="13" font-weight="600" fill="#1e293b">validator</text>
  <text x="225" y="430" text-anchor="middle" font-size="10" fill="#8a94a3">sqlglot · SELECT-only · 화이트리스트</text>
  <line x1="225" y1="444" x2="225" y2="462" stroke="#475569" stroke-width="1.3" marker-end="url(#mf)"/>

  <!-- Executor -->
  <rect x="110" y="464" width="230" height="52" rx="10" fill="#fff" stroke="#d9dfe8" stroke-width="1.2"/>
  <text x="225" y="485" text-anchor="middle" font-size="13" font-weight="600" fill="#1e293b">Executor</text>
  <text x="225" y="502" text-anchor="middle" font-size="10" fill="#8a94a3">read-only · LIMIT · timeout</text>
  <line x1="225" y1="516" x2="225" y2="534" stroke="#475569" stroke-width="1.3" marker-end="url(#mf)"/>

  <!-- formatter -->
  <rect x="110" y="536" width="230" height="52" rx="10" fill="#fff" stroke="#d9dfe8" stroke-width="1.2"/>
  <text x="225" y="557" text-anchor="middle" font-size="13" font-weight="600" fill="#1e293b">formatter</text>
  <text x="225" y="574" text-anchor="middle" font-size="10" fill="#8a94a3">요약(LLM) · 거절/무결과 4분기</text>

  <!-- 출력 chips -->
  <line x1="225" y1="588" x2="133" y2="605" stroke="#475569" stroke-width="1.1" marker-end="url(#mf)"/>
  <line x1="225" y1="588" x2="194" y2="605" stroke="#475569" stroke-width="1.1" marker-end="url(#mf)"/>
  <line x1="225" y1="588" x2="256" y2="605" stroke="#475569" stroke-width="1.1" marker-end="url(#mf)"/>
  <line x1="225" y1="588" x2="317" y2="605" stroke="#475569" stroke-width="1.1" marker-end="url(#mf)"/>
  <rect x="106" y="608" width="52" height="30" rx="8" fill="#fff" stroke="#d9dfe8"/>
  <text x="132" y="627" text-anchor="middle" font-size="10.5" fill="#475569">요약</text>
  <rect x="168" y="608" width="52" height="30" rx="8" fill="#fff" stroke="#d9dfe8"/>
  <text x="194" y="627" text-anchor="middle" font-size="10.5" fill="#475569">표</text>
  <rect x="230" y="608" width="52" height="30" rx="8" fill="#fff" stroke="#d9dfe8"/>
  <text x="256" y="627" text-anchor="middle" font-size="10.5" fill="#475569">차트</text>
  <rect x="292" y="608" width="52" height="30" rx="8" fill="#fff" stroke="#d9dfe8"/>
  <text x="318" y="627" text-anchor="middle" font-size="10.5" fill="#475569">SQL</text>
  <line x1="132" y1="638" x2="216" y2="673" stroke="#475569" stroke-width="1.1" marker-end="url(#mf)"/>
  <line x1="194" y1="638" x2="222" y2="673" stroke="#475569" stroke-width="1.1" marker-end="url(#mf)"/>
  <line x1="256" y1="638" x2="228" y2="673" stroke="#475569" stroke-width="1.1" marker-end="url(#mf)"/>
  <line x1="318" y1="638" x2="234" y2="673" stroke="#475569" stroke-width="1.1" marker-end="url(#mf)"/>

  <!-- 응답 -->
  <rect x="110" y="676" width="230" height="40" rx="10" fill="#fff" stroke="#d9dfe8" stroke-width="1.2"/>
  <text x="225" y="701" text-anchor="middle" font-size="13" font-weight="600" fill="#1e293b">응답</text>

  <!-- ───────── 좌측 여백: 루프/분기 (변경점) ───────── -->
  <!-- validate 실패 → generate 재생성 -->
  <path d="M110,418 C 74,418 74,340 110,340" fill="none" stroke="#64748b" stroke-width="1.1" stroke-dasharray="4 3" marker-end="url(#ml)"/>
  <text transform="rotate(-90 66 379)" x="66" y="379" text-anchor="middle" font-size="9" fill="#64748b">검증 실패 → 재생성 ≤2</text>
  <!-- exec_error → generate 수리 -->
  <path d="M110,490 C 50,490 50,356 110,356" fill="none" stroke="#64748b" stroke-width="1.1" stroke-dasharray="4 3" marker-end="url(#ml)"/>
  <text transform="rotate(-90 40 423)" x="40" y="423" text-anchor="middle" font-size="9" fill="#64748b">실행 오류 → 수리</text>
  <!-- route 위험 → format 거절 -->
  <path d="M110,254 C 24,254 24,562 110,562" fill="none" stroke="#64748b" stroke-width="1.1" stroke-dasharray="4 3" marker-end="url(#ml)"/>
  <text transform="rotate(-90 14 408)" x="14" y="408" text-anchor="middle" font-size="9" fill="#64748b">위험 판정 → 거절</text>
  <!-- schema_link 값 애매 → format 되묻기 -->
  <path d="M110,190 C 8,190 8,548 110,548" fill="none" stroke="#64748b" stroke-width="1.1" stroke-dasharray="4 3" marker-end="url(#ml)"/>
  <text x="56" y="178" text-anchor="middle" font-size="9" fill="#64748b">값 애매 → 되묻기</text>

  <!-- ───────── 우측: 도구 · 인프라 ───────── -->
  <text x="460" y="20" font-size="11" fill="#8a94a3">도구 · 인프라</text>

  <!-- retriever -->
  <line x1="340" y1="182" x2="458" y2="182" stroke="#94a3b8" stroke-width="1.1" stroke-dasharray="4 3" marker-end="url(#md)"/>
  <text x="392" y="174" font-size="9" fill="#94a3b8">tool</text>
  <rect x="460" y="146" width="300" height="86" rx="10" fill="#eaf2fd" stroke="#79a9f0" stroke-width="1.2"/>
  <text x="610" y="168" text-anchor="middle" font-size="12.5" font-weight="600" fill="#1d63d8">schema_retriever · value_retriever</text>
  <text x="610" y="186" text-anchor="middle" font-size="9.5" fill="#5b8ad2">임베딩 top-k + FK · ≤20테이블은 전체 스키마</text>
  <text x="610" y="201" text-anchor="middle" font-size="9.5" fill="#5b8ad2">값 확정 exact/synonym만 주입 · 불확실은 차단</text>
  <text x="610" y="216" text-anchor="middle" font-size="9.5" fill="#5b8ad2">example_repository · few-shot 예시(실행 검증)</text>

  <!-- LiteLLM -->
  <line x1="340" y1="254" x2="458" y2="266" stroke="#94a3b8" stroke-width="1.1" stroke-dasharray="4 3" marker-end="url(#md)"/>
  <line x1="340" y1="336" x2="458" y2="292" stroke="#94a3b8" stroke-width="1.1" stroke-dasharray="4 3" marker-end="url(#md)"/>
  <rect x="460" y="248" width="300" height="58" rx="10" fill="#f1edfd" stroke="#b3a5ee" stroke-width="1.2"/>
  <text x="610" y="271" text-anchor="middle" font-size="12.5" font-weight="600" fill="#6b4fd8">LiteLLM 게이트웨이</text>
  <text x="610" y="289" text-anchor="middle" font-size="9.5" fill="#8b78d9">모든 LLM 콜 단일 진입 · 재시도·백오프</text>

  <!-- Langfuse -->
  <line x1="610" y1="306" x2="610" y2="316" stroke="#94a3b8" stroke-width="1.1" stroke-dasharray="4 3" marker-end="url(#md)"/>
  <rect x="460" y="318" width="300" height="62" rx="10" fill="#f6f5fb" stroke="#cfc9ea" stroke-width="1.2"/>
  <text x="610" y="340" text-anchor="middle" font-size="12.5" font-weight="600" fill="#6b4fd8">Langfuse 관측</text>
  <text x="610" y="356" text-anchor="middle" font-size="9.5" fill="#8b78d9">토큰·비용·지연 트레이스 (비동기 전송)</text>
  <text x="610" y="370" text-anchor="middle" font-size="9.5" fill="#8b78d9">PII 마스킹 fail-closed · 로컬 백업 로그</text>

  <!-- sql_validator -->
  <line x1="340" y1="418" x2="458" y2="420" stroke="#94a3b8" stroke-width="1.1" stroke-dasharray="4 3" marker-end="url(#md)"/>
  <text x="392" y="410" font-size="9" fill="#94a3b8">tool</text>
  <rect x="460" y="396" width="300" height="52" rx="10" fill="#eaf2fd" stroke="#79a9f0" stroke-width="1.2"/>
  <text x="610" y="417" text-anchor="middle" font-size="12.5" font-weight="600" fill="#1d63d8">sql_validator</text>
  <text x="610" y="434" text-anchor="middle" font-size="9.5" fill="#5b8ad2">sqlglot 문법 · 단일 SELECT · 화이트리스트</text>

  <!-- sql_executor -->
  <line x1="340" y1="490" x2="458" y2="492" stroke="#94a3b8" stroke-width="1.1" stroke-dasharray="4 3" marker-end="url(#md)"/>
  <text x="392" y="482" font-size="9" fill="#94a3b8">tool</text>
  <rect x="460" y="468" width="300" height="52" rx="10" fill="#eaf2fd" stroke="#79a9f0" stroke-width="1.2"/>
  <text x="610" y="489" text-anchor="middle" font-size="12.5" font-weight="600" fill="#1d63d8">sql_executor</text>
  <text x="610" y="506" text-anchor="middle" font-size="9.5" fill="#5b8ad2">read-only · SELECT only · LIMIT 강제</text>

  <!-- Supabase cylinder -->
  <line x1="610" y1="520" x2="610" y2="538" stroke="#94a3b8" stroke-width="1.1" stroke-dasharray="4 3" marker-end="url(#md)"/>
  <path d="M510,550 v50 a100,10 0 0 0 200,0 v-50" fill="#eaf2fd" stroke="#79a9f0" stroke-width="1.2"/>
  <ellipse cx="610" cy="550" rx="100" ry="10" fill="#eaf2fd" stroke="#79a9f0" stroke-width="1.2"/>
  <text x="610" y="580" text-anchor="middle" font-size="12.5" font-weight="600" fill="#1d63d8">Supabase (PostgreSQL)</text>
  <text x="610" y="596" text-anchor="middle" font-size="9.5" fill="#5b8ad2">Retail DB · 11 tables · read-only 계정</text>

  <!-- 캡션 -->
  <text x="110" y="740" font-size="9" fill="#b0b8c4">Sequel NL2SQL 파이프라인 · 현행 — 이전 대비: normalize 추가 · 값 애매 되묻기 · 수리 루프 · 전 난이도 pro2 · SQLite→Supabase · Langfuse 관측(PII 마스킹)</text>
</svg>
