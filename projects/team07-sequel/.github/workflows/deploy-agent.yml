name: Deploy Agent to GCE VM

# 2026-07-12: Cloud Run -> GCE VM(text2sql-agent-vm) 이전에 맞춰 배포 방식 변경.
# 백엔드와 동일한 패턴: 이미지 빌드/push는 그대로, 마지막 배포 단계만
# `gcloud run deploy` -> `gcloud compute instances update-container`로 교체.
# agent VM 생성 시 이미 --container-env로 SUPABASE_DB_URL/UPSTAGE_API_KEY/
# LANGFUSE_* 값을 심어뒀으므로, 여기서 다시 --set-env-vars를 넘길 필요가 없다.
# (오히려 여기서 다시 넘기면 오래된 값으로 덮어쓸 위험이 있어 의도적으로 뺐다.)

on:
  push:
    branches: [main]
    paths:
      - 'projects/team07-sequel/app/**'
      - 'projects/team07-sequel/pyproject.toml'
      - 'projects/team07-sequel/uv.lock'
      - 'projects/team07-sequel/Dockerfile.api'
      - 'projects/team07-sequel/.env.example'
      - 'projects/team07-sequel/data/**'
      - '.github/workflows/deploy-agent.yml'

permissions:
  contents: read
  id-token: write

jobs:
  deploy:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - id: auth
        uses: google-github-actions/auth@v2
        with:
          workload_identity_provider: ${{ secrets.WIF_PROVIDER }}
          service_account: ${{ secrets.GCP_SERVICE_ACCOUNT }}

      - uses: google-github-actions/setup-gcloud@v2

      - name: Docker 인증
        run: gcloud auth configure-docker asia-northeast3-docker.pkg.dev

      - name: 이미지 빌드 & push
        run: |
          docker build -f projects/team07-sequel/Dockerfile.api \
            -t asia-northeast3-docker.pkg.dev/${{ secrets.GCP_PROJECT_ID }}/text2sql-repo/agent:${{ github.sha }} \
            projects/team07-sequel
          docker push asia-northeast3-docker.pkg.dev/${{ secrets.GCP_PROJECT_ID }}/text2sql-repo/agent:${{ github.sha }}

      - name: agent VM 컨테이너 이미지 교체
        run: |
          gcloud compute instances update-container text2sql-agent-vm \
            --zone=asia-northeast3-a \
            --container-image=asia-northeast3-docker.pkg.dev/${{ secrets.GCP_PROJECT_ID }}/text2sql-repo/agent:${{ github.sha }} \
            --project=${{ secrets.GCP_PROJECT_ID }}

      - name: 헬스체크 대기 및 확인 (내부망이라 백엔드 VM 경유)
        run: |
          # agent는 시작 시 스키마 임베딩 인덱스를 새로 만들어서 기동에 시간이
          # 걸릴 수 있다. 한 번만 확인하지 않고 최대 6회(10초 간격, 총 1분)
          # 재시도해서, 컨테이너가 아직 뜨는 중일 때 false negative로 실패
          # 처리되지 않게 한다.
          for i in $(seq 1 6); do
            if gcloud compute ssh text2sql-backend-vm \
                --zone=asia-northeast3-a --tunnel-through-iap \
                --project=${{ secrets.GCP_PROJECT_ID }} \
                --command="curl -sf http://10.10.0.2:8001/health"; then
              echo "헬스체크 통과"
              exit 0
            fi
            echo "아직 준비 안 됨, 10초 후 재시도 ($i/6)"
            sleep 10
          done
          echo "헬스체크 6회 모두 실패"
          exit 1
