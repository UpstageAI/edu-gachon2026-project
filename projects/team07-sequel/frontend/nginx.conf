# Cloud Run은 8080 포트로 들어오는 요청을 컨테이너에 전달하므로 8080으로 리스닝한다.
server {
    listen 8080;
    server_name _;

    root /usr/share/nginx/html;
    index index.html;

    # React Router 등 클라이언트 사이드 라우팅을 쓰지 않더라도,
    # 새로고침 시 404가 나지 않도록 index.html로 fallback 처리한다.
    location / {
        try_files $uri $uri/ /index.html;
    }
}
