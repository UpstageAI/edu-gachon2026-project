name: Docker Build & Push CD

on:
  push:
    branches: [main]
    paths:
      - 'Dockerfile'
      - 'app/**'
      - 'tools/**'
      - 'preprocessors/**'
      - 'requirements.txt'
      - '.github/workflows/docker-cd.yml'
  workflow_dispatch:  # Actions 탭에서 수동 실행 가능

permissions:
  contents: read
  packages: write  # ghcr.io에 올리려면 필요

env:
  REGISTRY: ghcr.io
  IMAGE_NAME: ${{ github.repository }}  # SafetyTrip2026/BE 형태로 자동 지정됨

jobs:
  build-and-push:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Log in to GitHub Container Registry
        uses: docker/login-action@v3
        with:
          registry: ${{ env.REGISTRY }}
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}  # 별도 등록 필요 없음, GitHub이 자동 제공

      - name: Extract metadata (tags)
        id: meta
        uses: docker/metadata-action@v5
        with:
          images: ${{ env.REGISTRY }}/${{ env.IMAGE_NAME }}
          tags: |
            type=raw,value=latest
            type=sha,format=short

      - name: Build and push
        uses: docker/build-push-action@v5
        with:
          context: .
          push: true
          tags: ${{ steps.meta.outputs.tags }}
          labels: ${{ steps.meta.outputs.labels }}
          cache-from: type=gha
          cache-to: type=gha,mode=max