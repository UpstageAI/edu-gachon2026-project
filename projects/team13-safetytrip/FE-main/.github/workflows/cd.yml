name: CD

on:
  workflow_run:
    workflows:
      - CI
    branches:
      - main
    types:
      - completed

  workflow_dispatch:
    inputs:
      rollback:
        description: "Rollback to previous deployed image"
        required: false
        type: boolean
        default: false

concurrency:
  group: ${{ github.workflow }}-production
  cancel-in-progress: false

permissions:
  contents: read
  packages: write

env:
  REGISTRY: ghcr.io
  IMAGE_SUFFIX: safetytrip-fe
  CONTAINER_NAME: safetytrip-fe
  PUBLIC_PORT: "80"
  HEALTH_PATH: /
  VITE_API_BASE_URL: http://136.68.189.140

jobs:
  build-and-push:
    name: Build & Push Image
    runs-on: ubuntu-latest
    if: ${{ (github.event_name == 'workflow_run' && github.event.workflow_run.conclusion == 'success') || (github.event_name == 'workflow_dispatch' && !inputs.rollback) }}
    outputs:
      image_tag: ${{ steps.image.outputs.image_tag }}
      latest_tag: ${{ steps.image.outputs.latest_tag }}
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Log in to GitHub Container Registry
        uses: docker/login-action@v3
        with:
          registry: ${{ env.REGISTRY }}
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Set image tags
        id: image
        run: |
          OWNER_LC=$(echo "${GITHUB_REPOSITORY_OWNER}" | tr '[:upper:]' '[:lower:]')
          IMAGE_NAME="${REGISTRY}/${OWNER_LC}/${IMAGE_SUFFIX}"
          SHORT_SHA=$(echo "${GITHUB_SHA}" | cut -c1-7)
          echo "image_tag=${IMAGE_NAME}:${SHORT_SHA}" >> "$GITHUB_OUTPUT"
          echo "latest_tag=${IMAGE_NAME}:latest" >> "$GITHUB_OUTPUT"

      - name: Build and push Docker image
        uses: docker/build-push-action@v6
        with:
          context: .
          push: true
          tags: |
            ${{ steps.image.outputs.image_tag }}
            ${{ steps.image.outputs.latest_tag }}
          build-args: |
            VITE_API_BASE_URL=${{ env.VITE_API_BASE_URL }}
          cache-from: type=gha
          cache-to: type=gha,mode=max

  deploy:
    name: Deploy to GCE
    runs-on: ubuntu-latest
    needs: build-and-push
    if: ${{ always() && (needs.build-and-push.result == 'success' || inputs.rollback) }}
    steps:
      - name: Check deploy secrets
        id: guard
        env:
          GCE_HOST: ${{ secrets.GCE_HOST }}
          GCE_USER: ${{ secrets.GCE_USER }}
          GCE_SSH_KEY: ${{ secrets.GCE_SSH_KEY }}
          GHCR_READ_TOKEN: ${{ secrets.GHCR_READ_TOKEN }}
        run: |
          if [ -z "$GCE_HOST" ] || [ -z "$GCE_USER" ] || [ -z "$GCE_SSH_KEY" ] || [ -z "$GHCR_READ_TOKEN" ]; then
            echo "enabled=false" >> "$GITHUB_OUTPUT"
            echo "GCE deploy skipped. Add GCE_HOST, GCE_USER, GCE_SSH_KEY, and GHCR_READ_TOKEN secrets to enable it."
          else
            echo "enabled=true" >> "$GITHUB_OUTPUT"
          fi

      - name: Configure SSH
        if: steps.guard.outputs.enabled == 'true'
        env:
          GCE_HOST: ${{ secrets.GCE_HOST }}
          GCE_SSH_KEY: ${{ secrets.GCE_SSH_KEY }}
        run: |
          mkdir -p ~/.ssh
          printf "%s\n" "$GCE_SSH_KEY" > ~/.ssh/deploy_key
          chmod 600 ~/.ssh/deploy_key
          ssh-keyscan -H "$GCE_HOST" >> ~/.ssh/known_hosts

      - name: Deploy image
        if: steps.guard.outputs.enabled == 'true' && !inputs.rollback
        env:
          GCE_HOST: ${{ secrets.GCE_HOST }}
          GCE_USER: ${{ secrets.GCE_USER }}
          GHCR_READ_TOKEN: ${{ secrets.GHCR_READ_TOKEN }}
          GHCR_USER: ${{ github.actor }}
          IMAGE_TAG: ${{ needs.build-and-push.outputs.image_tag }}
          CONTAINER_NAME: ${{ env.CONTAINER_NAME }}
          PUBLIC_PORT: ${{ env.PUBLIC_PORT }}
          HEALTH_PATH: ${{ env.HEALTH_PATH }}
        run: |
          TOKEN_B64=$(printf "%s" "$GHCR_READ_TOKEN" | base64 -w 0)
          ssh -i ~/.ssh/deploy_key "$GCE_USER@$GCE_HOST" \
            "IMAGE_TAG='$IMAGE_TAG' GHCR_USER='$GHCR_USER' TOKEN_B64='$TOKEN_B64' CONTAINER_NAME='$CONTAINER_NAME' PUBLIC_PORT='$PUBLIC_PORT' HEALTH_PATH='$HEALTH_PATH' bash -s" <<'REMOTE'
          set -euo pipefail

          DEPLOY_DIR="$HOME/safetytrip-fe"
          mkdir -p "$DEPLOY_DIR"
          cd "$DEPLOY_DIR"

          if [ -f ".current_image" ]; then
            cp .current_image .previous_image
          fi
          echo "$IMAGE_TAG" > .current_image

          printf "%s" "$TOKEN_B64" | base64 -d | docker login ghcr.io -u "$GHCR_USER" --password-stdin
          docker pull "$IMAGE_TAG"

          docker stop "$CONTAINER_NAME" || true
          docker rm "$CONTAINER_NAME" || true
          docker run -d \
            --name "$CONTAINER_NAME" \
            --restart unless-stopped \
            -p "${PUBLIC_PORT}:80" \
            "$IMAGE_TAG"

          for i in $(seq 1 12); do
            HTTP_STATUS=$(curl -sL -o /dev/null -w "%{http_code}" "http://localhost:${PUBLIC_PORT}${HEALTH_PATH}" || echo "000")
            if [ "$HTTP_STATUS" = "200" ]; then
              echo "Health check passed: HTTP $HTTP_STATUS"
              exit 0
            fi
            echo "Health check attempt $i/12 failed: HTTP $HTTP_STATUS"
            sleep 5
          done

          echo "Health check failed. Container logs:"
          docker logs --tail=100 "$CONTAINER_NAME" || true

          if [ -f ".previous_image" ]; then
            PREVIOUS_IMAGE=$(cat .previous_image)
            echo "Rolling back to $PREVIOUS_IMAGE"
            docker pull "$PREVIOUS_IMAGE"
            docker stop "$CONTAINER_NAME" || true
            docker rm "$CONTAINER_NAME" || true
            docker run -d \
              --name "$CONTAINER_NAME" \
              --restart unless-stopped \
              -p "${PUBLIC_PORT}:80" \
              "$PREVIOUS_IMAGE"
          fi

          exit 1
          REMOTE

      - name: Rollback to previous image
        if: steps.guard.outputs.enabled == 'true' && inputs.rollback
        env:
          GCE_HOST: ${{ secrets.GCE_HOST }}
          GCE_USER: ${{ secrets.GCE_USER }}
          CONTAINER_NAME: ${{ env.CONTAINER_NAME }}
          PUBLIC_PORT: ${{ env.PUBLIC_PORT }}
          HEALTH_PATH: ${{ env.HEALTH_PATH }}
        run: |
          ssh -i ~/.ssh/deploy_key "$GCE_USER@$GCE_HOST" \
            "CONTAINER_NAME='$CONTAINER_NAME' PUBLIC_PORT='$PUBLIC_PORT' HEALTH_PATH='$HEALTH_PATH' bash -s" <<'REMOTE'
          set -euo pipefail

          DEPLOY_DIR="$HOME/safetytrip-fe"
          cd "$DEPLOY_DIR"

          if [ ! -f ".previous_image" ]; then
            echo "No previous image recorded."
            exit 1
          fi

          PREVIOUS_IMAGE=$(cat .previous_image)
          docker pull "$PREVIOUS_IMAGE"

          docker stop "$CONTAINER_NAME" || true
          docker rm "$CONTAINER_NAME" || true
          docker run -d \
            --name "$CONTAINER_NAME" \
            --restart unless-stopped \
            -p "${PUBLIC_PORT}:80" \
            "$PREVIOUS_IMAGE"

          echo "$PREVIOUS_IMAGE" > .current_image

          for i in $(seq 1 12); do
            HTTP_STATUS=$(curl -sL -o /dev/null -w "%{http_code}" "http://localhost:${PUBLIC_PORT}${HEALTH_PATH}" || echo "000")
            if [ "$HTTP_STATUS" = "200" ]; then
              echo "Rollback health check passed: HTTP $HTTP_STATUS"
              exit 0
            fi
            echo "Rollback health check attempt $i/12 failed: HTTP $HTTP_STATUS"
            sleep 5
          done

          docker logs --tail=100 "$CONTAINER_NAME" || true
          exit 1
          REMOTE

  summary:
    name: Deployment Summary
    runs-on: ubuntu-latest
    needs:
      - build-and-push
      - deploy
    if: always()
    steps:
      - name: Create summary
        run: |
          echo "## SafetyTrip FE Deployment" >> "$GITHUB_STEP_SUMMARY"
          echo "" >> "$GITHUB_STEP_SUMMARY"
          echo "| Category | Result |" >> "$GITHUB_STEP_SUMMARY"
          echo "|---|---|" >> "$GITHUB_STEP_SUMMARY"
          echo "| Build & Push | ${{ needs.build-and-push.result }} |" >> "$GITHUB_STEP_SUMMARY"
          echo "| Deploy | ${{ needs.deploy.result }} |" >> "$GITHUB_STEP_SUMMARY"
          echo "| Commit | \`${{ github.sha }}\` |" >> "$GITHUB_STEP_SUMMARY"
          echo "| Branch | \`${{ github.ref_name }}\` |" >> "$GITHUB_STEP_SUMMARY"
          echo "| Actor | ${{ github.actor }} |" >> "$GITHUB_STEP_SUMMARY"

          if [ "${{ inputs.rollback }}" = "true" ]; then
            echo "" >> "$GITHUB_STEP_SUMMARY"
            echo "> Rollback mode was requested." >> "$GITHUB_STEP_SUMMARY"
          fi
