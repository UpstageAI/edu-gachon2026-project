project:
  title: AI 학과 길잡이 — 가천대학교 인공지능학과 안내 Agent
  summary: 공식 학사 자료를 근거로 질의응답·졸업요건 계산·과목 추천·이메일 리마인드를 수행하는 가천대 인공지능학과 전용 AI Agent 서비스입니다.
  category: AI 서비스
  keywords:
    - AI Agent
    - RAG
    - LangGraph
    - Education
    - Chatbot

problem:
  summary: 수강신청·학사일정·졸업요건 등 학과 정보가 여러 곳에 흩어져 있고, 범용 챗봇은 학번·학과별로 다른 규정을 출처 없이 추측해 신뢰하기 어렵습니다.
  target_users:
    - 가천대학교 인공지능학과 신입생
    - 학사 정보 탐색이 익숙하지 않은 재학생

solution:
  summary: 공식 문서 기반 RAG 검색으로 출처를 함께 제시하고, LangGraph 의도 라우팅으로 계산·추천·리마인드 도구를 선택하며, 다층 가드레일로 범위 밖 질문은 추측 없이 문의처로 안내합니다.
  main_features:
    - 학사·학과 지식 RAG 질의응답(출처 인용)
    - 졸업요건 및 부족 학점 계산(학번별 기준 반영)
    - 다음 학기 과목 추천(학년/학기/트랙)
    - 사용자 승인 기반 이메일 리마인드
    - 다층 가드레일 라우팅 및 학번 되묻기

tech_stack:
  frontend:
    - Jinja2
    - Bootstrap
  backend:
    - FastAPI
    - LangGraph
  ai:
    - Upstage Solar Pro 3
    - Upstage Document Parse
    - RAG (pgvector)
  database:
    - PostgreSQL
    - pgvector
  infra:
    - Docker
    - Google Cloud (GCE)
    - GitHub Actions (CI/CD)
    - Langfuse
    - Resend Email API

