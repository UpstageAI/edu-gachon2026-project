services:
  api:
    build:
      context: .
      dockerfile: Dockerfile.api
    ports:
      - "8000:8000"
    env_file:
      - .env
    volumes:
      - chroma_data:/app/chroma_db
    healthcheck:
      test:
        [
          "CMD",
          "python",
          "-c",
          "import urllib.request; urllib.request.urlopen('http://localhost:8000/health', timeout=5).read()",
        ]
      interval: 30s
      timeout: 5s
      start_period: 20s
      retries: 3

  frontend:
    build:
      context: .
      dockerfile: Dockerfile.frontend
    ports:
      - "8501:8501"
    environment:
      API_BASE_URL: http://api:8000
      USE_STREAM: "true"
    depends_on:
      api:
        condition: service_healthy

  ingest:
    build:
      context: .
      dockerfile: Dockerfile.api
    env_file:
      - .env
    volumes:
      - chroma_data:/app/chroma_db
    command: python scripts/ingest_chroma.py
    profiles:
      - tools

volumes:
  chroma_data:
